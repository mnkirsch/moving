<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marc &amp; Shelby &mdash; House Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>

  <nav>
    <div class="nav-logo">Marc <span>&amp;</span> Shelby</div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showView('dashboard')">Home</button>
      <button class="nav-tab"        onclick="showView('rooms')">Rooms</button>
      <button class="nav-tab"        onclick="showView('shopping')">Shopping list</button>
      <button class="nav-tab"        onclick="showView('purchases')">Purchases</button>
    </div>
    <div class="nav-right">
      <span class="sync-dot" id="sync-dot"></span>
      <span id="sync-label">Connecting...</span>
    </div>
  </nav>

  <div class="hero">
    <div>
      <div class="hero-title">Moving in,<br><em>together.</em></div>
      <p class="hero-sub">Everything for the new place &mdash; what you have, what you need, and who's buying what.</p>
    </div>
    <div class="stats-row" id="hero-stats">
      <div class="stat-pill"><div class="num">-</div><div class="lbl">Loading</div></div>
    </div>
  </div>

  <!-- Dashboard -- outside container, full bleed dark bg -->
  <div class="view active" id="view-dashboard">

    <!-- Clock -->
    <div class="dash-widget dash-clock">
      <div>
        <div id="dash-time">--:--</div>
        <div id="dash-date">Loading...</div>
      </div>
    </div>

    <!-- Weather -->
    <div class="dash-widget dash-weather" id="weather-widget">
      <div class="dash-stats-title">Austin, TX</div>
      <div class="weather-current" id="weather-current">
        <div class="weather-icon">&#x23F3;</div>
        <div class="weather-temp">--&deg;</div>
        <div class="weather-meta"><span class="weather-label">Loading...</span></div>
      </div>
      <div class="weather-forecast" id="weather-forecast"></div>
    </div>

    <!-- Move-in stats -->
    <div class="dash-widget dash-stats-widget">
      <div class="dash-stats-title">Move-in tracker</div>
      <div id="dash-stats">
        <div class="dash-stat"><div class="dash-stat-num">-</div><div class="dash-stat-lbl">Loading</div></div>
      </div>
    </div>

    <!-- Quick links -->
    <div class="dash-widget">
      <div class="dash-links-title">Quick links</div>
      <div class="dash-links">
        <button class="dash-link-btn" onclick="showView('rooms')">Rooms <span>&#8594;</span></button>
        <button class="dash-link-btn" onclick="showView('shopping')">Shopping list <span>&#8594;</span></button>
        <button class="dash-link-btn" onclick="showView('purchases')">Purchases <span>&#8594;</span></button>
      </div>
    </div>

  </div>

  <div class="container">
    <div class="error-banner" id="error-banner"></div>

    <!-- Rooms -->
    <div class="view" id="view-rooms">
      <div id="rooms-loading" class="loading">Loading rooms</div>
      <div id="rooms-content" style="display:none">
        <div class="room-nav" id="room-nav"></div>
        <div id="room-sections"></div>
      </div>
    </div>

    <!-- Shopping list -->
    <div class="view" id="view-shopping">
      <div class="shopping-grid" id="shopping-grid"></div>
    </div>

    <!-- Purchases -->
    <div class="view" id="view-purchases">
      <div class="purchases-layout">
        <div>
          <div class="card">
            <div class="card-header">
              <h3>Purchase log</h3>
              <span id="purchase-count"></span>
            </div>
            <table class="purchase-table">
              <thead>
                <tr><th>Item</th><th>Price</th><th>Who paid</th><th>Date</th><th></th></tr>
              </thead>
              <tbody id="purchase-tbody"></tbody>
              <tfoot id="purchase-tfoot"></tfoot>
            </table>
            <div class="add-purchase">
              <input  type="text"   id="p-item"  placeholder="Item name" />
              <input  type="number" id="p-price" placeholder="$0.00" step="0.01" />
              <select id="p-who">
                <option value="Marc">Marc</option>
                <option value="Shelby">Shelby</option>
                <option value="Both">Both</option>
              </select>
              <button class="btn-add-purchase" onclick="addPurchase()">Add</button>
            </div>
          </div>
        </div>
        <div>
          <div class="card">
            <div class="card-header"><h3>Balance</h3></div>
            <div class="balance-card" id="balance-card">
              <div class="loading">Loading</div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /container -->

  <!-- Scripts: load order matters -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/db.js"></script>
  <script src="js/rooms.js"></script>
  <script src="js/purchases.js"></script>
  <script src="js/shopping.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
